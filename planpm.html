<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#CC0000">
<title>Plan PM — TURNOS TOYOTA</title>
<style>
:root {
  --red:#CC0000;--red-d:#990000;
  --bg:#F2F2F7;--card:#FFF;--border:#E5E5EA;
  --text:#1C1C1E;--text2:#636366;--text3:#AEAEB2;
  --green:#34C759;--orange:#FF9500;--blue:#007AFF;--purple:#5856D6;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --r:14px;--rs:10px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#000;--card:#1C1C1E;--border:#38383A;--text:#FFF;--text2:#AEAEB2;--text3:#636366;}
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.4;}
.app{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available;}
.status-bar{height:var(--safe-t);background:var(--red);flex-shrink:0;}
.navbar{background:var(--red);padding:0 16px;flex-shrink:0;}
.navbar-top{display:flex;align-items:center;gap:10px;padding:12px 0 10px;}
.back-btn{width:32px;height:32px;background:rgba(255,255,255,0.2);border:none;border-radius:50%;color:white;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.back-btn:active{background:rgba(255,255,255,0.35);}
.navbar-title{color:white;font-size:17px;font-weight:700;flex:1;}
.navbar-sub{color:rgba(255,255,255,0.7);font-size:11px;}
.save-btn{background:rgba(255,255,255,0.2);border:none;border-radius:20px;color:white;font-size:13px;font-weight:600;padding:7px 14px;cursor:pointer;}
.save-btn:active{background:rgba(255,255,255,0.35);}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(20px + var(--safe-b));}

/* PM SELECTOR */
.pm-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.pm-btn{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:12px 6px;text-align:center;cursor:pointer;transition:all .15s;}
.pm-btn.active{border-color:var(--red);background:#FFF0F0;}
.pm-btn:active{opacity:.7;}
.pm-btn-label{font-size:13px;font-weight:700;color:var(--text);}
.pm-btn-km{font-size:11px;color:var(--text3);margin-top:2px;}
.pm-btn-type{font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;display:inline-block;margin-top:4px;}
.type-inter{background:#E0F7F0;color:#00796B;}
.type-pm{background:#FFE5E5;color:#CC0000;}

/* ALERTA DISTRIBUCION */
.dist-alert{border-radius:var(--r);padding:14px 16px;margin-bottom:14px;border:2px solid;display:flex;align-items:flex-start;gap:12px;}
.dist-alert.ok{background:#E3F9E9;border-color:#34C759;}
.dist-alert.warn{background:#FFF5E0;border-color:#FF9500;}
.dist-alert.danger{background:#FFE5E5;border-color:#CC0000;}
.dist-icon{font-size:24px;flex-shrink:0;}
.dist-title{font-size:14px;font-weight:700;margin-bottom:3px;}
.dist-sub{font-size:12px;color:var(--text2);}
.dist-bar{margin-top:8px;}
.dist-bar-track{height:8px;background:rgba(0,0,0,0.1);border-radius:4px;overflow:hidden;}
.dist-bar-fill{height:100%;border-radius:4px;transition:width .3s;}
.dist-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-top:3px;}

/* KM INPUT */
.km-input-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:14px;margin-bottom:14px;}
.km-input-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em;}
.km-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.km-field{display:flex;flex-direction:column;gap:4px;}
.km-label{font-size:12px;color:var(--text3);}
.km-inp{padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:15px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;width:100%;}
.km-inp:focus{border-color:var(--red);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:10px;text-align:center;}
.stat-num{font-size:20px;font-weight:800;}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;}
.stat-card.green .stat-num{color:var(--green);}
.stat-card.orange .stat-num{color:var(--orange);}
.stat-card.blue .stat-num{color:var(--blue);}

/* PROGRESS */
.progress-wrap{margin-bottom:14px;}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px;}
.progress-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width .3s;}

/* PLAN SECTION */
.plan-section{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:12px;}
.plan-section-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.plan-section-title{font-size:14px;font-weight:700;}
.plan-section-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:#FFE5E5;color:#CC0000;}
.plan-section-badge.green{background:#E3F9E9;color:#1A7F3C;}

.plan-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px;}
.plan-row:last-child{border:none;}
.plan-row:active{background:var(--bg);}
.plan-row.done{opacity:.5;}
.check-circle{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;cursor:pointer;}
.check-circle.checked{background:var(--green);border-color:var(--green);color:white;}
.plan-row-content{flex:1;min-width:0;cursor:pointer;}
.plan-row-title{font-size:14px;color:var(--text);}
.plan-row.done .plan-row-title{text-decoration:line-through;color:var(--text3);}
.plan-row-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.plan-row-int{font-size:11px;color:var(--text3);}
.plan-row-cost{font-size:11px;color:var(--blue);font-weight:600;}
.plan-row-time{font-size:11px;color:var(--purple);}
.expand-btn{color:var(--text3);font-size:18px;flex-shrink:0;cursor:pointer;padding:2px 4px;}
.edit-btn{color:var(--text3);font-size:16px;flex-shrink:0;cursor:pointer;padding:2px 4px;}

.plan-row-notes{padding:8px 14px 12px 52px;font-size:13px;color:var(--text2);background:var(--bg);border-bottom:1px solid var(--border);display:none;}
.plan-row-notes.show{display:block;}
.parts-list{margin-top:6px;}
.part-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);padding:3px 0;}
.part-dot{width:6px;height:6px;background:var(--red);border-radius:50%;flex-shrink:0;}

.add-row-btn{display:flex;align-items:center;gap:8px;padding:12px 14px;color:var(--red);font-size:14px;font-weight:600;cursor:pointer;border-top:1px solid var(--border);}
.add-row-btn:active{background:var(--bg);}

/* BADGES */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.b-r{background:#FFE5E5;color:#CC0000;}
.b-i{background:#FFF5E0;color:#B86800;}
.b-d{background:#E3F0FF;color:#0055CC;}
.b-e{background:#E3F9E9;color:#1A7F3C;}
.b-m{background:#E0F7F0;color:#00796B;}
.b-l{background:#FFF0E3;color:#B84800;}
.b-c{background:#FCE8F3;color:#AD1457;}

.note-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.5;}
.reset-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:12px;width:100%;font-family:inherit;}

/* EDIT SHEET */
.edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;}
.edit-overlay.open{display:block;}
.edit-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;z-index:101;max-height:88vh;overflow-y:auto;padding-bottom:var(--safe-b);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);}
.edit-sheet.open{transform:translateY(0);}
.sh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.sh-hdr{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sh-title{font-size:17px;font-weight:700;}
.sh-close{width:30px;height:30px;background:var(--bg);border:none;border-radius:50%;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.sh-body{padding:16px 18px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.fl{font-size:13px;font-weight:600;color:var(--text2);}
.fi{padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:15px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;width:100%;}
.fi:focus{border-color:var(--red);}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-p{width:100%;background:var(--red);color:white;border:none;border-radius:var(--rs);padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;}
.btn-p:active{background:var(--red-d);}
.btn-d{width:100%;background:#FFE5E5;color:#CC0000;border:1.5px solid #FFAAAA;border-radius:var(--rs);padding:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:8px;}
</style>
</head>
<body>
<div class="app">
  <div class="status-bar"></div>
  <div class="navbar">
    <div class="navbar-top">
      <button class="back-btn" onclick="history.back()">‹</button>
      <div style="flex:1;">
        <div class="navbar-title">Plan de Mantenimiento</div>
        <div class="navbar-sub">Toyota Hilux — Cadencia 2.500 · 5.000 · 10.000 km</div>
      </div>
      <button class="save-btn" onclick="saveAll()">💾 Guardar</button>
    </div>
  </div>
  <div class="content" id="cnt"></div>
</div>

<!-- EDIT SHEET -->
<div class="edit-overlay" id="editOv" onclick="closeEdit()"></div>
<div class="edit-sheet" id="editSh">
  <div class="sh-handle"></div>
  <div class="sh-hdr">
    <span class="sh-title" id="editTitle">Editar tarea</span>
    <button class="sh-close" onclick="closeEdit()">✕</button>
  </div>
  <div class="sh-body">
    <div class="fg"><label class="fl">Tarea *</label><input class="fi" id="eTask" placeholder="Descripción de la tarea"></div>
    <div class="frow2">
      <div class="fg"><label class="fl">Intervalo</label><input class="fi" id="eInt" placeholder="2.500 km"></div>
      <div class="fg"><label class="fl">Acción</label>
        <select class="fi" id="eAct">
          <option value="R">R — Reemplazar</option>
          <option value="I">I — Inspeccionar</option>
          <option value="D">D — Diagnóstico</option>
          <option value="E">E — Engrase</option>
          <option value="M">M — Muestra</option>
          <option value="L">L — Limpieza</option>
          <option value="C">C — Condicional</option>
        </select>
      </div>
    </div>
    <div class="frow2">
      <div class="fg"><label class="fl">Costo (ARS)</label><input class="fi" type="number" inputmode="numeric" id="eCost" placeholder="0"></div>
      <div class="fg"><label class="fl">Tiempo est.</label><input class="fi" id="eTime" placeholder="30 min"></div>
    </div>
    <div class="fg"><label class="fl">Repuestos necesarios</label><input class="fi" id="eParts" placeholder="Filtro aceite, junta carter..."></div>
    <div class="fg"><label class="fl">Notas</label><input class="fi" id="eNotes" placeholder="Observaciones, referencias..."></div>
    <button class="btn-p" onclick="saveEdit()">Guardar cambios</button>
    <button class="btn-d" onclick="deleteTask()">Eliminar tarea</button>
  </div>
</div>

<script>
const BADGE={R:'b-r',I:'b-i',D:'b-d',E:'b-e',M:'b-m',L:'b-l',C:'b-c'};
const DIST_KM = 75000;

// PM STRUCTURE
// Inter-PM 1.250 km = mitad de PM 2.500
// PM 2.500 km = base
// Inter-PM 2.500 km = mitad de PM 5.000 (mismo que PM base)
// PM 5.000 km
// Inter-PM 5.000 km = mitad de PM 10.000 (mismo que PM 5.000)
// PM 10.000 km

const PMS = [
  { id:'inter1250', label:'Inter-PM',  km:'1.250 km',  type:'inter', color:'type-inter', desc:'Mitad del PM 2.500 km' },
  { id:'pm2500',    label:'PM 2.500',  km:'2.500 km',  type:'pm',    color:'type-pm',    desc:'Servicio base completo' },
  { id:'pm5000',    label:'PM 5.000',  km:'5.000 km',  type:'pm',    color:'type-pm',    desc:'Incluye PM 2.500 + diagnóstico' },
  { id:'pm10000',   label:'PM 10.000', km:'10.000 km', type:'pm',    color:'type-pm',    desc:'Incluye PM 5.000 + extras' },
];

function defaultPlan(){
  return {
    inter1250: [
      {id:101, task:'Cambio filtro admisión (sílice)',   int:'1.250 km', act:'R', cost:9000,  time:'20 min', parts:'Filtro admisión específico',  notes:'Obligatorio alta montaña — contaminación sílice', done:false},
      {id:102, task:'Limpieza sistema de admisión',      int:'1.250 km', act:'L', cost:5000,  time:'30 min', parts:'Limpiador admisión',           notes:'Cuando PPM sílice moderadamente elevados', done:false},
    ],
    pm2500: [
      {id:201, task:'Cambio aceite motor',               int:'2.500 km', act:'R', cost:45000, time:'20 min', parts:'Aceite motor 5W30/10W40, arandela carter', notes:'Cambiar viscosidad según presión', done:false},
      {id:202, task:'Reemplazo filtro aceite',           int:'2.500 km', act:'R', cost:8000,  time:'10 min', parts:'Filtro aceite IMV / Hilux 16',  notes:'', done:false},
      {id:203, task:'Reemplazo filtro aire',             int:'2.500 km', act:'R', cost:12000, time:'10 min', parts:'Filtro aire Hilux 16 / IMV',   notes:'Limpiar caja antes de instalar', done:false},
      {id:204, task:'Reemplazo filtro combustible',      int:'2.500 km', act:'R', cost:15000, time:'15 min', parts:'Filtro combustible Hilux 16',  notes:'Purgar sistema después del cambio', done:false},
      {id:205, task:'Toma muestra aceite motor',         int:'2.500 km', act:'M', cost:3000,  time:'10 min', parts:'Kit toma muestra',             notes:'Analizar Fe/Cr/Ni/Al/Pb/Si', done:false},
      {id:206, task:'Medición presión aceite',           int:'2.500 km', act:'M', cost:0,     time:'10 min', parts:'Kit toma presión aceite',      notes:'Ralentí 25-35 PSI · 3000 RPM 60-70 PSI', done:false},
      {id:207, task:'Engrase crucetas cardán',           int:'2.500 km', act:'E', cost:2000,  time:'15 min', parts:'Grasa especial cardan',        notes:'Aplicar en todas las crucetas', done:false},
      {id:208, task:'Inspección frenos y embrague',      int:'2.500 km', act:'I', cost:0,     time:'20 min', parts:'',                            notes:'Incluye líquido de frenos y embrague', done:false},
      {id:209, task:'Inspección dirección y suspensión', int:'2.500 km', act:'I', cost:0,     time:'20 min', parts:'',                            notes:'Verificar holguras y desgaste', done:false},
      {id:210, task:'Inspección sistema eléctrico',      int:'2.500 km', act:'I', cost:0,     time:'15 min', parts:'',                            notes:'Bornes batería, cableado, luces', done:false},
      {id:211, task:'Inspección neumáticos y carrocería',int:'2.500 km', act:'I', cost:0,     time:'10 min', parts:'',                            notes:'Desgaste, presión y daños', done:false},
      {id:212, task:'Inspección sistema refrigeración',  int:'2.500 km', act:'I', cost:0,     time:'10 min', parts:'',                            notes:'Nivel, mangueras, radiador', done:false},
      {id:213, task:'Inspección tren de fuerza',         int:'2.500 km', act:'I', cost:0,     time:'15 min', parts:'',                            notes:'Diferencial, transferencia, cardán', done:false},
      {id:214, task:'Inspección correa de servicio',     int:'2.500 km', act:'I', cost:0,     time:'5 min',  parts:'',                            notes:'Estado y tensión', done:false},
      {id:215, task:'Control de calidad final',          int:'2.500 km', act:'I', cost:0,     time:'15 min', parts:'',                            notes:'Verificación técnica final y registro', done:false},
    ],
    pm5000: [
      {id:301, task:'Todo lo del PM 2.500 km',           int:'5.000 km', act:'I', cost:0,     time:'',       parts:'',                            notes:'Incluye aceite, filtros e inspecciones completas', done:false},
      {id:302, task:'Diagnóstico computarizado Toyota',   int:'5.000 km', act:'D', cost:8000,  time:'30 min', parts:'Scanner XTOOL INPLUS500',     notes:'Leer y borrar códigos — registrar resultados', done:false},
      {id:303, task:'Chequeo bujías precalentamiento',   int:'5.000 km', act:'I', cost:0,     time:'15 min', parts:'Bujías Hilux 16 (si falla)',   notes:'Reemplazar juego completo si falla alguna', done:false},
      {id:304, task:'Inspección A/C y calefacción',      int:'5.000 km', act:'I', cost:0,     time:'10 min', parts:'',                            notes:'Funcionamiento y limpieza evaporador', done:false},
    ],
    pm10000: [
      {id:401, task:'Todo lo del PM 5.000 km',           int:'10.000 km',act:'I', cost:0,     time:'',       parts:'',                            notes:'Incluye PM 2.500 + PM 5.000 completos', done:false},
      {id:402, task:'Cambio líquido de frenos',          int:'10.000 km',act:'R', cost:6000,  time:'45 min', parts:'Líquido de frenos DOT 4',      notes:'Purgar todo el sistema — 4 canales', done:false},
      {id:403, task:'Reemplazo batería (si corresponde)',int:'10.000 km',act:'I', cost:35000, time:'15 min', parts:'Batería Toyota compatible',    notes:'Evaluar con scanner Konnwei KW720 — reemplazar si necesario', done:false},
    ],
  };
}

function loadData(){
  try{const r=localStorage.getItem('tf_plan_v4');if(r)return JSON.parse(r);}catch(e){}
  return defaultPlan();
}
function saveData(){try{localStorage.setItem('tf_plan_v4',JSON.stringify(data));}catch(e){}}
function loadKm(){try{const r=localStorage.getItem('tf_km_dist');if(r)return JSON.parse(r);}catch(e){}return{actual:0,ultimaDist:0};}
function saveKm(){try{localStorage.setItem('tf_km_dist',JSON.stringify(kmDist));}catch(e){}}

let data = loadData();
let kmDist = loadKm();
let curPM = 'pm2500';
let editIdx = null;

function render(){
  const c = document.getElementById('cnt');
  let h = '';

  // ── ALERTA DISTRIBUCIÓN ──────────────────────────────
  const kmActual = parseInt(kmDist.actual) || 0;
  const kmUltDist = parseInt(kmDist.ultimaDist) || 0;
  const diff = kmActual - kmUltDist;
  const pct = kmUltDist > 0 ? Math.min(Math.round(diff / DIST_KM * 100), 100) : 0;
  let alertClass='ok', alertIcon='⛓️', alertTitle='Cadena de distribución OK', alertSub='';
  if(kmUltDist === 0){
    alertClass='warn'; alertIcon='⚠️';
    alertTitle='Ingresá los km para monitorear la distribución';
    alertSub='Completá los campos de km abajo';
  } else if(diff >= DIST_KM){
    alertClass='danger'; alertIcon='🔴';
    alertTitle='¡CAMBIO DE DISTRIBUCIÓN VENCIDO!';
    alertSub=`Diferencia: ${diff.toLocaleString('es-AR')} km — Límite: 75.000 km`;
  } else if(diff >= DIST_KM * 0.85){
    alertClass='warn'; alertIcon='🟡';
    alertTitle='Próximo cambio de distribución';
    alertSub=`Faltan ${(DIST_KM - diff).toLocaleString('es-AR')} km para los 75.000 km`;
  } else {
    alertSub=`${diff.toLocaleString('es-AR')} km desde último cambio — faltan ${(DIST_KM-diff).toLocaleString('es-AR')} km`;
  }
  const barColor = alertClass==='ok'?'#34C759':alertClass==='warn'?'#FF9500':'#CC0000';

  h += `<div class="dist-alert ${alertClass}">
    <span class="dist-icon">${alertIcon}</span>
    <div style="flex:1;">
      <div class="dist-title">${alertTitle}</div>
      <div class="dist-sub">${alertSub}</div>
      ${kmUltDist>0?`<div class="dist-bar">
        <div class="dist-bar-track"><div class="dist-bar-fill" style="width:${pct}%;background:${barColor};"></div></div>
        <div class="dist-bar-labels"><span>Último cambio: ${kmUltDist.toLocaleString('es-AR')} km</span><span>${pct}% / 75.000 km</span></div>
      </div>`:''}
    </div>
  </div>`;

  // ── KM INPUT ─────────────────────────────────────────
  h += `<div class="km-input-card">
    <div class="km-input-title">🔧 Kilometraje distribución</div>
    <div class="km-row">
      <div class="km-field">
        <span class="km-label">Km actuales</span>
        <input class="km-inp" type="number" inputmode="numeric" placeholder="150.000" value="${kmDist.actual||''}" oninput="kmDist.actual=this.value;saveKm();render()">
      </div>
      <div class="km-field">
        <span class="km-label">Km último cambio dist.</span>
        <input class="km-inp" type="number" inputmode="numeric" placeholder="75.000" value="${kmDist.ultimaDist||''}" oninput="kmDist.ultimaDist=this.value;saveKm();render()">
      </div>
    </div>
  </div>`;

  // ── PM SELECTOR ───────────────────────────────────────
  h += `<div class="pm-selector">`;
  PMS.forEach(p => {
    h += `<div class="pm-btn ${curPM===p.id?'active':''}" onclick="curPM='${p.id}';render()">
      <div class="pm-btn-label">${p.label}</div>
      <div class="pm-btn-km">${p.km}</div>
      <span class="pm-btn-type ${p.color}">${p.type==='inter'?'Inter-PM':'PM'}</span>
    </div>`;
  });
  h += `</div>`;

  // ── CHECKLIST ─────────────────────────────────────────
  const tasks = data[curPM] || [];
  const done = tasks.filter(t=>t.done).length;
  const total = tasks.length;
  const pctTask = total>0?Math.round(done/total*100):0;
  const totalCost = tasks.reduce((s,t)=>s+(t.cost||0),0);
  const totalTime = tasks.reduce((s,t)=>s+parseTime(t.time),0);
  const curPMDef = PMS.find(p=>p.id===curPM);

  h += `<div class="stats-row">
    <div class="stat-card green"><div class="stat-num">${done}/${total}</div><div class="stat-lbl">Completadas</div></div>
    <div class="stat-card blue"><div class="stat-num">$${Math.round(totalCost/1000)}k</div><div class="stat-lbl">Costo est.</div></div>
    <div class="stat-card orange"><div class="stat-num">${formatTime(totalTime)}</div><div class="stat-lbl">Tiempo est.</div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span>Progreso — ${curPMDef?.label||''}</span><span style="font-weight:700;color:${pctTask===100?'var(--green)':'var(--text2)'};">${pctTask}%</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pctTask}%;${pctTask===100?'background:var(--green);':''}"></div></div>
  </div>
  <div class="plan-section">
    <div class="plan-section-hdr">
      <span class="plan-section-title">${curPMDef?.label} — ${curPMDef?.desc}</span>
      <span class="plan-section-badge ${curPMDef?.type==='inter'?'green':''}">${curPMDef?.km}</span>
    </div>`;

  if(!tasks.length){
    h+=`<div style="padding:24px;text-align:center;color:var(--text3);font-size:14px;">Sin tareas — tocá + para agregar</div>`;
  } else {
    tasks.forEach((t,i)=>{
      h+=`<div class="plan-row ${t.done?'done':''}">
        <div class="check-circle ${t.done?'checked':''}" onclick="toggleDone('${curPM}',${i},event)">${t.done?'✓':''}</div>
        <div class="plan-row-content" onclick="toggleNotes('${curPM}-${i}')">
          <div class="plan-row-title">${t.task}</div>
          <div class="plan-row-meta">
            <span class="badge ${BADGE[t.act]||'b-i'}">${t.act}</span>
            <span class="plan-row-int">${t.int}</span>
            ${t.cost>0?`<span class="plan-row-cost">$${t.cost.toLocaleString('es-AR')}</span>`:''}
            ${t.time?`<span class="plan-row-time">⏱ ${t.time}</span>`:''}
          </div>
        </div>
        <span class="expand-btn" onclick="toggleNotes('${curPM}-${i}')">⌄</span>
        <span class="edit-btn" onclick="openEdit(${i})">✎</span>
      </div>
      <div class="plan-row-notes" id="notes-${curPM}-${i}">
        ${t.notes?`<div style="margin-bottom:6px;">📝 ${t.notes}</div>`:''}
        ${t.parts?`<div class="parts-list">${t.parts.split(',').map(p=>`<div class="part-item"><div class="part-dot"></div><span>${p.trim()}</span></div>`).join('')}</div>`:''}
        ${!t.notes&&!t.parts?'<span style="color:var(--text3)">Sin notas registradas</span>':''}
      </div>`;
    });
  }

  h+=`<div class="add-row-btn" onclick="openEdit(-1)"><span style="font-size:20px;">+</span> Agregar tarea</div>
  </div>
  <button class="reset-btn" onclick="resetCheck()">↺ Resetear checklist para nuevo servicio</button>
  <div class="note-box">⚡ Inter-PM = mitad del intervalo · 1 h ralentí = 70 km · Distribución: cada 75.000 km</div>`;

  c.innerHTML = h;
}

function toggleDone(pm, idx, e){
  e.stopPropagation();
  data[pm][idx].done = !data[pm][idx].done;
  saveData(); render();
}
function toggleNotes(id){
  const el=document.getElementById(`notes-${id}`);
  if(el) el.classList.toggle('show');
}
function openEdit(idx){
  editIdx=idx;
  const t=idx>=0?data[curPM][idx]:null;
  document.getElementById('editTitle').textContent=t?'Editar tarea':'Nueva tarea';
  document.getElementById('eTask').value=t?.task||'';
  document.getElementById('eInt').value=t?.int||'2.500 km';
  document.getElementById('eAct').value=t?.act||'I';
  document.getElementById('eCost').value=t?.cost||'';
  document.getElementById('eTime').value=t?.time||'';
  document.getElementById('eParts').value=t?.parts||'';
  document.getElementById('eNotes').value=t?.notes||'';
  document.getElementById('editOv').classList.add('open');
  document.getElementById('editSh').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeEdit(){
  document.getElementById('editOv').classList.remove('open');
  document.getElementById('editSh').classList.remove('open');
  document.body.style.overflow='';
}
function saveEdit(){
  const task=document.getElementById('eTask').value.trim();
  if(!task){alert('Ingresá la descripción.');return;}
  const entry={
    id:editIdx>=0?data[curPM][editIdx].id:Date.now(),
    task,
    int:document.getElementById('eInt').value.trim()||'2.500 km',
    act:document.getElementById('eAct').value,
    cost:parseInt(document.getElementById('eCost').value)||0,
    time:document.getElementById('eTime').value.trim(),
    parts:document.getElementById('eParts').value.trim(),
    notes:document.getElementById('eNotes').value.trim(),
    done:editIdx>=0?data[curPM][editIdx].done:false,
  };
  if(editIdx>=0) data[curPM][editIdx]=entry;
  else data[curPM].push(entry);
  saveData();closeEdit();render();
}
function deleteTask(){
  if(editIdx<0)return;
  if(!confirm('¿Eliminar esta tarea?'))return;
  data[curPM].splice(editIdx,1);
  saveData();closeEdit();render();
}
function resetCheck(){
  if(!confirm('¿Resetear todas las tareas como no completadas?'))return;
  Object.keys(data).forEach(k=>data[k].forEach(t=>t.done=false));
  saveData();render();
}
function saveAll(){
  saveData();saveKm();
  const btn=document.querySelector('.save-btn');
  btn.textContent='✅ Guardado';
  setTimeout(()=>btn.textContent='💾 Guardar',1500);
}
function parseTime(str){
  if(!str)return 0;
  const h=str.match(/(\d+)\s*h/),m=str.match(/(\d+)\s*min/);
  return(h?parseInt(h[1])*60:0)+(m?parseInt(m[1]):0);
}
function formatTime(mins){
  if(!mins)return'0m';
  if(mins>=60)return`${Math.floor(mins/60)}h${mins%60>0?mins%60+'m':''}`;
  return`${mins}m`;
}
render();
</script>
</body>
</html>
